version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vocal-remover-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: vocal_remover
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: vocal-remover-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      target: backend-worker
    container_name: vocal-remover-backend
    restart: always
    command: npm run start
    working_dir: /app/backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/vocal_remover
      - REDIS_URL=redis://redis:6379
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      target: backend-worker
    container_name: vocal-remover-worker
    restart: always
    command: npm run worker
    working_dir: /app/backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/vocal_remover
      - REDIS_URL=redis://redis:6379
      - PYTHON_PATH=python3
      - MAX_AUDIO_DURATION_LIMIT=600
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      target: frontend
    container_name: vocal-remover-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
